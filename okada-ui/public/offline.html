<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OkadaGo Offline</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #061610;
        color: #f4f8f4;
      }

      main {
        width: min(92vw, 480px);
        padding: 32px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      h1 {
        margin-top: 0;
      }

      p {
        line-height: 1.6;
        color: #c6d4cb;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You're offline.</h1>
      <p>
        OkadaGo keeps the shell available for low-connectivity scenarios. Reconnect to refresh live
        booking, dispatch, wallet, and operations data.
      </p>
    </main>
  </body>
</html>
