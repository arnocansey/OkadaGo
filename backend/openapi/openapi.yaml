openapi: 3.1.0
info:
  title: OkadaGo API
  version: 0.1.0
  summary: REST contract outline for the OkadaGo motorcycle ride-hailing platform
servers:
  - url: https://api.okadago.example
tags:
  - name: Auth
  - name: Passenger
  - name: Rider
  - name: Ride
  - name: Wallet
  - name: Admin
paths:
  /auth/signup:
    post:
      tags: [Auth]
      summary: Register a passenger or rider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
  /auth/otp/verify:
    post:
      tags: [Auth]
      summary: Verify OTP for phone onboarding or sensitive action
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpVerificationRequest'
      responses:
        '200':
          description: OTP verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
  /passengers/me:
    get:
      tags: [Passenger]
      summary: Fetch current passenger profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Passenger profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassengerProfile'
  /rides/estimate:
    post:
      tags: [Ride]
      summary: Estimate a fare before booking
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RideEstimateRequest'
      responses:
        '200':
          description: Ride estimate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RideEstimateResponse'
  /rides:
    post:
      tags: [Ride]
      summary: Create a ride request
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRideRequest'
      responses:
        '201':
          description: Ride created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ride'
    get:
      tags: [Ride]
      summary: List rides for the current actor
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: cursor
          schema:
            type: string
      responses:
        '200':
          description: Paginated ride list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RideListResponse'
  /rides/{rideId}/accept:
    post:
      tags: [Rider]
      summary: Rider accepts an offered trip
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RideId'
      responses:
        '200':
          description: Ride accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ride'
  /rides/{rideId}/status:
    patch:
      tags: [Ride]
      summary: Update a ride status
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RideId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RideStatusUpdateRequest'
      responses:
        '200':
          description: Ride updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ride'
  /wallets/me:
    get:
      tags: [Wallet]
      summary: Fetch wallets for current actor
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Wallet list
          content:
            application/json:
              schema:
                type: object
                properties:
                  wallets:
                    type: array
                    items:
                      $ref: '#/components/schemas/Wallet'
  /wallets/{walletId}/transactions:
    get:
      tags: [Wallet]
      summary: Fetch wallet transaction history
      security:
        - bearerAuth: []
      parameters:
        - name: walletId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Transactions
          content:
            application/json:
              schema:
                type: object
                properties:
                  transactions:
                    type: array
                    items:
                      $ref: '#/components/schemas/WalletTransaction'
  /admin/riders/pending:
    get:
      tags: [Admin]
      summary: List riders awaiting approval
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Pending rider list
          content:
            application/json:
              schema:
                type: object
                properties:
                  riders:
                    type: array
                    items:
                      $ref: '#/components/schemas/RiderProfile'
  /admin/riders/{riderId}/decision:
    post:
      tags: [Admin]
      summary: Approve or reject a rider
      security:
        - bearerAuth: []
      parameters:
        - name: riderId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RiderDecisionRequest'
      responses:
        '200':
          description: Rider decision saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RiderProfile'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    RideId:
      name: rideId
      in: path
      required: true
      schema:
        type: string
  schemas:
    Money:
      type: object
      required: [amount, currency]
      properties:
        amount:
          type: string
          description: Decimal string
        currency:
          type: string
          example: GHS
    SignupRequest:
      type: object
      required: [role, fullName, phoneCountryCode, phoneLocal, preferredCurrency]
      properties:
        role:
          type: string
          enum: [passenger, rider]
        fullName:
          type: string
        email:
          type: string
          format: email
        phoneCountryCode:
          type: string
        phoneLocal:
          type: string
        password:
          type: string
        preferredCurrency:
          type: string
    OtpVerificationRequest:
      type: object
      required: [phoneE164, code]
      properties:
        phoneE164:
          type: string
        code:
          type: string
        intent:
          type: string
          example: signup
    AuthSessionResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: '#/components/schemas/UserSummary'
    UserSummary:
      type: object
      properties:
        id:
          type: string
        role:
          type: string
        fullName:
          type: string
        accountStatus:
          type: string
    LocationPoint:
      type: object
      required: [address, latitude, longitude]
      properties:
        address:
          type: string
        latitude:
          type: number
        longitude:
          type: number
    RideEstimateRequest:
      type: object
      required: [pickup, destination]
      properties:
        pickup:
          $ref: '#/components/schemas/LocationPoint'
        destination:
          $ref: '#/components/schemas/LocationPoint'
        rideType:
          type: string
          example: standard_bike
        promoCode:
          type: string
    RideEstimateResponse:
      type: object
      properties:
        estimate:
          $ref: '#/components/schemas/Money'
        distanceKm:
          type: number
        durationMinutes:
          type: integer
        fareBreakdown:
          type: array
          items:
            type: object
            properties:
              label:
                type: string
              amount:
                $ref: '#/components/schemas/Money'
    CreateRideRequest:
      type: object
      required: [pickup, destination, paymentMethod]
      properties:
        pickup:
          $ref: '#/components/schemas/LocationPoint'
        destination:
          $ref: '#/components/schemas/LocationPoint'
        paymentMethod:
          type: string
          enum: [cash, card, wallet, mobile_money]
        scheduledFor:
          type: string
          format: date-time
        promoCode:
          type: string
        notes:
          type: string
    RideStatusUpdateRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [assigned, arriving, arrived, started, completed, cancelled]
        reason:
          type: string
    Ride:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
        passenger:
          $ref: '#/components/schemas/UserSummary'
        rider:
          $ref: '#/components/schemas/UserSummary'
        pickup:
          $ref: '#/components/schemas/LocationPoint'
        destination:
          $ref: '#/components/schemas/LocationPoint'
        estimatedFare:
          $ref: '#/components/schemas/Money'
        finalFare:
          $ref: '#/components/schemas/Money'
        paymentMethod:
          type: string
        requestedAt:
          type: string
          format: date-time
    RideListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Ride'
        nextCursor:
          type: string
          nullable: true
    PassengerProfile:
      type: object
      properties:
        id:
          type: string
        user:
          $ref: '#/components/schemas/UserSummary'
        referralCode:
          type: string
        preferredPayment:
          type: string
    RiderProfile:
      type: object
      properties:
        id:
          type: string
        user:
          $ref: '#/components/schemas/UserSummary'
        approvalStatus:
          type: string
        displayCode:
          type: string
        city:
          type: string
        onlineStatus:
          type: boolean
    RiderDecisionRequest:
      type: object
      required: [decision]
      properties:
        decision:
          type: string
          enum: [approve, reject, suspend]
        notes:
          type: string
    Wallet:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        currency:
          type: string
        availableBalance:
          type: string
        lockedBalance:
          type: string
    WalletTransaction:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        status:
          type: string
        amount:
          $ref: '#/components/schemas/Money'
        reference:
          type: string
        createdAt:
          type: string
          format: date-time
